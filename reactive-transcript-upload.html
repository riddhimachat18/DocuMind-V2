<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DocuMind - Reactive Transcript Upload</title>
  
  <!-- External Dependencies -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-primary: #0e0e0e;
      --bg-secondary: #161616;
      --bg-tertiary: #1e1e1e;
      --accent: #c8a84b;
      --accent-dim: rgba(200, 168, 75, 0.2);
      --text-primary: #ffffff;
      --text-secondary: #a0a0a0;
      --text-tertiary: #707070;
      --success: #4ade80;
      --error: #ef4444;
      --border: #2a2a2a;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Sora', sans-serif;
      font-size: 14px;
      line-height: 1.6;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow-x: hidden;
    }
    
    .mono {
      font-family: 'IBM Plex Mono', monospace;
    }
    
    .container {
      display: flex;
      height: 100vh;
    }
    
    .sidebar {
      width: 280px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      padding: 20px;
      overflow-y: auto;
    }
    
    .main-content {
      flex: 1;
      padding: 30px;
      overflow-y: auto;
    }
    
    .api-config {
      margin-bottom: 20px;
      padding: 15px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 4px;
    }
    
    .api-config label {
      display: block;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    
    .api-config input {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-primary);
      font-size: 13px;
      font-family: 'IBM Plex Mono', monospace;
    }
    
    .api-config input:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    .api-config .error {
      color: var(--error);
      font-size: 11px;
      margin-top: 4px;
    }
    
    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-tertiary);
      margin-bottom: 12px;
    }
    
    .data-source {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    
    .data-source:last-child {
      border-bottom: none;
    }
    
    .data-source-name {
      font-size: 13px;
      color: var(--text-primary);
    }
    
    .badge {
      padding: 3px 8px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 500;
      font-family: 'IBM Plex Mono', monospace;
    }
    
    .badge.connected {
      background: rgba(74, 222, 128, 0.2);
      color: var(--success);
    }
    
    .badge.not-connected {
      background: rgba(112, 112, 112, 0.2);
      color: var(--text-tertiary);
    }
    
    .badge.new {
      background: var(--accent-dim);
      color: var(--accent);
    }
    
    .badge.updated {
      background: rgba(239, 68, 68, 0.2);
      color: var(--error);
    }
    
    .upload-button {
      width: 100%;
      padding: 12px;
      margin: 20px 0;
      background: var(--accent);
      color: var(--bg-primary);
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    
    .upload-button:hover {
      opacity: 0.9;
    }
    
    .upload-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .file-list {
      margin-top: 20px;
    }
    
    .file-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 4px;
      margin-bottom: 8px;
    }
    
    .file-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }
    
    .file-info {
      flex: 1;
      min-width: 0;
    }
    
    .file-name {
      font-size: 12px;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .file-meta {
      font-size: 10px;
      color: var(--text-tertiary);
      margin-top: 2px;
    }
    
    .status-message {
      margin-top: 20px;
      padding: 12px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 12px;
      color: var(--accent);
      text-align: center;
    }
    
    .brd-header {
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    
    .brd-title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    
    .brd-meta {
      display: flex;
      gap: 15px;
      align-items: center;
      flex-wrap: wrap;
    }
    
    .brd-version {
      padding: 4px 10px;
      background: var(--accent-dim);
      color: var(--accent);
      border-radius: 3px;
      font-size: 12px;
      font-weight: 500;
      font-family: 'IBM Plex Mono', monospace;
    }
    
    .brd-status {
      padding: 4px 10px;
      background: rgba(74, 222, 128, 0.2);
      color: var(--success);
      border-radius: 3px;
      font-size: 12px;
      font-weight: 500;
    }
    
    .brd-status.draft {
      background: rgba(239, 68, 68, 0.2);
      color: var(--error);
    }
    
    .brd-date {
      font-size: 12px;
      color: var(--text-tertiary);
    }
    
    .brd-section {
      margin-bottom: 40px;
    }
    
    .brd-section-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 15px;
      color: var(--text-primary);
    }
    
    .brd-section-content {
      color: var(--text-secondary);
      line-height: 1.8;
    }
    
    .requirement-item {
      padding: 15px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 4px;
      margin-bottom: 12px;
      position: relative;
    }
    
    .requirement-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    
    .requirement-id {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--accent);
      font-weight: 500;
    }
    
    .requirement-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      flex: 1;
    }
    
    .requirement-description {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
    }
    
    .requirement-source {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-top: 8px;
    }
    
    .stakeholder-table {
      width: 100%;
      border-collapse: collapse;
    }
    
    .stakeholder-table th {
      text-align: left;
      padding: 10px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
    }
    
    .stakeholder-table td {
      padding: 10px;
      border: 1px solid var(--border);
      font-size: 13px;
      color: var(--text-primary);
    }
    
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    .checkmark {
      color: var(--success);
    }
    
    .error-icon {
      color: var(--error);
    }
    
    .skeleton {
      background: linear-gradient(90deg, var(--bg-secondary) 25%, var(--bg-tertiary) 50%, var(--bg-secondary) 75%);
      background-size: 200% 100%;
      animation: pulse 1.5s ease-in-out infinite;
      border-radius: 4px;
      height: 20px;
      margin-bottom: 10px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    @keyframes slideInLeft {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    
    @keyframes glow {
      0%, 100% {
        box-shadow: 0 0 0 rgba(200, 168, 75, 0);
      }
      50% {
        box-shadow: 0 0 20px rgba(200, 168, 75, 0.5);
      }
    }
    
    @keyframes pulse {
      0% {
        background-position: 200% 0;
      }
      100% {
        background-position: -200% 0;
      }
    }
    
    @keyframes flip {
      0% {
        transform: rotateY(0deg);
      }
      50% {
        transform: rotateY(90deg);
      }
      100% {
        transform: rotateY(0deg);
      }
    }
    
    .highlight-new {
      animation: slideInLeft 0.5s ease-out, glow 3s ease-in-out;
    }
    
    .highlight-updated {
      animation: glow 3s ease-in-out;
    }
    
    .version-flip {
      animation: flip 0.6s ease-in-out;
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Sidebar -->
    <div class="sidebar">
      <!-- API Configuration -->
      <div class="api-config">
        <label for="apiKey">Google Gemini API Key</label>
        <input 
          type="password" 
          id="apiKey" 
          placeholder="AIza..." 
          onchange="handleApiKeyChange(this.value)"
        />
        <div id="apiKeyError" class="error" style="display: none;"></div>
      </div>
      
      <!-- Data Sources -->
      <div class="section-title">DATA SOURCES</div>
      <div id="dataSources"></div>
      
      <!-- Upload Button -->
      <button class="upload-button" onclick="document.getElementById('fileInput').click()">
        Click to upload transcripts
      </button>
      <input 
        type="file" 
        id="fileInput" 
        accept=".pdf,.txt,.docx,.mp3,.mp4" 
        style="display: none;" 
        onchange="handleFileUpload(event)"
      />
      
      <!-- Uploaded Files -->
      <div class="section-title">UPLOADED FILES</div>
      <div id="fileList" class="file-list"></div>
      
      <!-- Status Message -->
      <div id="statusMessage" class="status-message" style="display: none;"></div>
    </div>
    
    <!-- Main Content -->
    <div class="main-content">
      <div id="brdContent"></div>
    </div>
  </div>

  <script>
    // Configure pdf.js worker
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    
    // Application State
    let state = {
      apiKey: '',
      uploadStatus: 'idle',
      currentFile: null,
      
      dataSources: {
        gmail: { connected: true, snippetCount: 47 },
        slack: { connected: true, snippetCount: 23 },
        meetingTranscripts: { connected: false, snippetCount: 0 }
      },
      
      uploadedFiles: [
        { 
          id: 'file-1', 
          name: 'requirements_draft.pdf', 
          status: 'complete', 
          snippetCount: 12,
          timestamp: 1708531200000
        },
        { 
          id: 'file-2', 
          name: 'stakeholder_notes.docx', 
          status: 'complete', 
          snippetCount: 8,
          timestamp: 1708531200000
        },
        { 
          id: 'file-3', 
          name: 'meeting_recording.mp3', 
          status: 'processing', 
          snippetCount: 0,
          timestamp: 1708531200000
        }
      ],
      
      snippets: [],
      
      brd: {
        projectName: 'Customer Portal Redesign',
        version: '3.0',
        status: 'Approved',
        lastUpdated: '2026-02-18',
        
        executiveSummary: 'The Customer Portal Redesign initiative aims to deliver a unified self-service platform capable of handling 50,000 concurrent users, reducing customer support ticket volume by 40% within six months of launch.',
        
        stakeholders: [
          { id: 'sh-1', name: 'Sarah Chen', role: 'Product Owner', email: 'sarah@acme.com' },
          { id: 'sh-2', name: 'James Rao', role: 'Tech Lead', email: 'james@acme.com' }
        ],
        
        functionalRequirements: [
          {
            id: 'FR-01',
            title: 'Users shall be able to manage subscription plans',
            description: 'Including upgrade, downgrade, and cancellation without requiring assistance from the support team.',
            source: 'gmail',
            isNew: false,
            isUpdated: false
          }
        ],
        
        nonFunctionalRequirements: [],
        assumptions: [],
        successMetrics: [],
        conflicts: []
      },
      
      statusMessage: '',
      errorMessage: ''
    };

    
    // API Key Handler
    function handleApiKeyChange(value) {
      const errorEl = document.getElementById('apiKeyError');
      if (value && !value.startsWith('AIza')) {
        errorEl.textContent = 'Invalid API key format (should start with AIza)';
        errorEl.style.display = 'block';
        state.apiKey = '';
      } else {
        errorEl.style.display = 'none';
        state.apiKey = value;
      }
    }
    
    // Text Extraction Functions
    async function extractPdfText(file) {
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      let fullText = '';
      
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const textContent = await page.getTextContent();
        const pageText = textContent.items.map(item => item.str).join(' ');
        fullText += pageText + '\n';
      }
      
      return fullText;
    }
    
    async function extractDocxText(file) {
      const arrayBuffer = await file.arrayBuffer();
      const result = await mammoth.extractRawText({ arrayBuffer });
      return result.value;
    }
    
    async function extractTxtText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => resolve(e.target.result);
        reader.onerror = reject;
        reader.readAsText(file);
      });
    }
    
    function chunkText(text, wordsPerChunk = 300) {
      const words = text.split(/\s+/).filter(w => w.length > 0);
      const chunks = [];
      
      for (let i = 0; i < words.length; i += wordsPerChunk) {
        const chunk = words.slice(i, i + wordsPerChunk).join(' ');
        if (chunk.trim()) {
          chunks.push(chunk);
        }
      }
      
      return chunks;
    }

    
    // Gemini API Functions
    async function classifySnippet(text, apiKey) {
      const prompt = `You are a business analyst AI. Classify the following text chunk from a document into exactly one category: functional_requirement, non_functional_requirement, stakeholder, assumption, constraint, success_metric, or noise. Also extract the key insight in one sentence. Respond only in JSON: { "category": "...", "insight": "...", "confidence": 0.0-1.0 }

Text to classify:
${text}`;

      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          contents: [{
            parts: [{
              text: prompt
            }]
          }],
          generationConfig: {
            temperature: 0.2,
            maxOutputTokens: 2000
          }
        })
      });
      
      if (!response.ok) {
        throw new Error(`API error: ${response.statusText}`);
      }
      
      const data = await response.json();
      const content = data.candidates[0].content.parts[0].text;
      // Extract JSON from markdown code blocks if present
      const jsonMatch = content.match(/```json\n([\s\S]*?)\n```/) || content.match(/\{[\s\S]*\}/);
      const jsonStr = jsonMatch ? (jsonMatch[1] || jsonMatch[0]) : content;
      return JSON.parse(jsonStr);
    }
    
    async function regenerateBRD(existingBRD, newSnippets, apiKey) {
      const prompt = `You are an expert business analyst. Update the BRD to incorporate new requirements. Return complete JSON with: executiveSummary, stakeholders, functionalRequirements, nonFunctionalRequirements, assumptions, successMetrics. Each requirement needs: id, title, description, source, isNew, isUpdated.

Existing BRD: ${JSON.stringify(existingBRD)}

New evidence snippets: ${JSON.stringify(newSnippets)}

Update the BRD to incorporate these new requirements. Return a complete JSON object with the same structure, marking new items with isNew: true and updated items with isUpdated: true.`;

      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          contents: [{
            parts: [{
              text: prompt
            }]
          }],
          generationConfig: {
            temperature: 0.3,
            maxOutputTokens: 2000
          }
        })
      });
      
      if (!response.ok) {
        throw new Error(`API error: ${response.statusText}`);
      }
      
      const data = await response.json();
      const content = data.candidates[0].content.parts[0].text;
      // Extract JSON from markdown code blocks if present
      const jsonMatch = content.match(/```json\n([\s\S]*?)\n```/) || content.match(/\{[\s\S]*\}/);
      const jsonStr = jsonMatch ? (jsonMatch[1] || jsonMatch[0]) : content;
      return JSON.parse(jsonStr);
    }

    
    // File Upload Handler
    async function handleFileUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      
      // Validate file size
      if (file.size > 10 * 1024 * 1024) {
        alert('File size must be less than 10MB');
        return;
      }
      
      // Validate API key
      if (!state.apiKey) {
        alert('Please enter your Google Gemini API key first');
        return;
      }
      
      try {
        // Add file to list
        const fileId = 'file-' + Date.now();
        state.uploadedFiles.push({
          id: fileId,
          name: file.name,
          status: 'uploading',
          snippetCount: 0,
          timestamp: Date.now()
        });
        
        updateUI();
        showStatus('Uploading...');
        
        // Extract text
        showStatus('Extracting text...');
        let text = '';
        const ext = file.name.split('.').pop().toLowerCase();
        
        if (ext === 'pdf') {
          text = await extractPdfText(file);
        } else if (ext === 'docx') {
          text = await extractDocxText(file);
        } else if (ext === 'txt') {
          text = await extractTxtText(file);
        } else {
          throw new Error('Unsupported file type');
        }
        
        // Chunk text
        const chunks = chunkText(text);
        const fileIndex = state.uploadedFiles.findIndex(f => f.id === fileId);
        state.uploadedFiles[fileIndex].snippetCount = chunks.length;
        state.uploadedFiles[fileIndex].status = 'classifying';
        updateUI();
        
        // Classify snippets
        showStatus(`Classifying ${chunks.length} snippets...`);
        const classifications = await Promise.all(
          chunks.map(async (chunk, index) => {
            try {
              const result = await classifySnippet(chunk, state.apiKey);
              return {
                id: `snippet-${Date.now()}-${index}`,
                source: 'meeting_transcript',
                fileName: file.name,
                chunkIndex: index,
                rawText: chunk,
                timestamp: Date.now(),
                ...result
              };
            } catch (error) {
              console.error('Classification error:', error);
              return null;
            }
          })
        );
        
        // Filter out noise and failed classifications
        const validSnippets = classifications.filter(s => s && s.category !== 'noise');
        state.snippets.push(...validSnippets);
        
        // Update file status
        state.uploadedFiles[fileIndex].status = 'generating';
        updateUI();

        
        // Regenerate BRD
        showStatus('Updating BRD...');
        const updatedBRD = await regenerateBRD(state.brd, validSnippets, state.apiKey);
        
        // Increment version
        const [major, minor] = state.brd.version.split('.').map(Number);
        updatedBRD.version = `${major + 1}.0`;
        updatedBRD.status = 'Draft — Pending Review';
        updatedBRD.lastUpdated = new Date().toISOString().split('T')[0];
        
        state.brd = updatedBRD;
        
        // Update Meeting Transcripts connection
        state.dataSources.meetingTranscripts.connected = true;
        state.dataSources.meetingTranscripts.snippetCount += validSnippets.length;
        
        // Complete
        state.uploadedFiles[fileIndex].status = 'complete';
        showStatus('');
        updateUI();
        
        // Trigger animations
        setTimeout(() => {
          document.querySelectorAll('.requirement-item').forEach(item => {
            const isNew = item.dataset.isNew === 'true';
            const isUpdated = item.dataset.isUpdated === 'true';
            if (isNew) {
              item.classList.add('highlight-new');
            } else if (isUpdated) {
              item.classList.add('highlight-updated');
            }
          });
          
          const versionEl = document.querySelector('.brd-version');
          if (versionEl) {
            versionEl.classList.add('version-flip');
          }
        }, 100);
        
      } catch (error) {
        console.error('Upload error:', error);
        const fileIndex = state.uploadedFiles.findIndex(f => f.name === file.name);
        if (fileIndex >= 0) {
          state.uploadedFiles[fileIndex].status = 'error';
        }
        showStatus('');
        alert('Error processing file: ' + error.message);
        updateUI();
      }
      
      // Reset file input
      event.target.value = '';
    }
    
    function showStatus(message) {
      const statusEl = document.getElementById('statusMessage');
      if (message) {
        statusEl.textContent = message;
        statusEl.style.display = 'block';
      } else {
        statusEl.style.display = 'none';
      }
    }

    
    // UI Rendering Functions
    function updateUI() {
      renderDataSources();
      renderFileList();
      renderBRD();
    }
    
    function renderDataSources() {
      const container = document.getElementById('dataSources');
      const sources = [
        { name: 'Gmail / Email', key: 'gmail' },
        { name: 'Slack', key: 'slack' },
        { name: 'Meeting Transcripts', key: 'meetingTranscripts' }
      ];
      
      container.innerHTML = sources.map(source => {
        const data = state.dataSources[source.key];
        const badgeClass = data.connected ? 'connected' : 'not-connected';
        const badgeText = data.connected 
          ? `Connected • ${data.snippetCount} snippets` 
          : 'Not Connected';
        
        return `
          <div class="data-source">
            <span class="data-source-name">${source.name}</span>
            <span class="badge ${badgeClass}">${badgeText}</span>
          </div>
        `;
      }).join('');
    }
    
    function renderFileList() {
      const container = document.getElementById('fileList');
      
      container.innerHTML = state.uploadedFiles.map(file => {
        let icon = '';
        if (file.status === 'uploading' || file.status === 'classifying' || file.status === 'generating') {
          icon = '<div class="spinner"></div>';
        } else if (file.status === 'complete') {
          icon = '<span class="checkmark">✓</span>';
        } else if (file.status === 'error') {
          icon = '<span class="error-icon">✗</span>';
        } else {
          icon = '<div class="spinner"></div>';
        }
        
        const snippetText = file.snippetCount > 0 ? `${file.snippetCount} snippets` : '';
        
        return `
          <div class="file-item">
            <div class="file-icon">${icon}</div>
            <div class="file-info">
              <div class="file-name">${file.name}</div>
              <div class="file-meta">${snippetText}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    
    function renderBRD() {
      const container = document.getElementById('brdContent');
      const brd = state.brd;
      
      const statusClass = brd.status === 'Approved' ? '' : 'draft';
      
      let html = `
        <div class="brd-header">
          <h1 class="brd-title">${brd.projectName}</h1>
          <div class="brd-meta">
            <span class="brd-version mono">v${brd.version}</span>
            <span class="brd-status ${statusClass}">${brd.status}</span>
            <span class="brd-date">Last updated: ${brd.lastUpdated}</span>
          </div>
        </div>
      `;
      
      // Executive Summary
      html += `
        <div class="brd-section">
          <h2 class="brd-section-title">Executive Summary</h2>
          <div class="brd-section-content">${brd.executiveSummary}</div>
        </div>
      `;
      
      // Stakeholder Register
      if (brd.stakeholders && brd.stakeholders.length > 0) {
        html += `
          <div class="brd-section">
            <h2 class="brd-section-title">Stakeholder Register</h2>
            <table class="stakeholder-table">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Role</th>
                  <th>Email</th>
                </tr>
              </thead>
              <tbody>
                ${brd.stakeholders.map(sh => `
                  <tr>
                    <td>${sh.name}</td>
                    <td>${sh.role}</td>
                    <td>${sh.email}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `;
      }
      
      // Functional Requirements
      if (brd.functionalRequirements && brd.functionalRequirements.length > 0) {
        html += `
          <div class="brd-section">
            <h2 class="brd-section-title">Functional Requirements</h2>
            ${brd.functionalRequirements.map(req => `
              <div class="requirement-item" data-is-new="${req.isNew}" data-is-updated="${req.isUpdated}">
                <div class="requirement-header">
                  <span class="requirement-id">${req.id}</span>
                  <span class="requirement-title">${req.title}</span>
                  ${req.isNew ? '<span class="badge new">NEW</span>' : ''}
                  ${req.isUpdated ? '<span class="badge updated">UPDATED</span>' : ''}
                </div>
                <div class="requirement-description">${req.description}</div>
                <div class="requirement-source">Source: ${req.source}</div>
              </div>
            `).join('')}
          </div>
        `;
      }

      
      // Non-Functional Requirements
      if (brd.nonFunctionalRequirements && brd.nonFunctionalRequirements.length > 0) {
        html += `
          <div class="brd-section">
            <h2 class="brd-section-title">Non-Functional Requirements</h2>
            ${brd.nonFunctionalRequirements.map(req => `
              <div class="requirement-item" data-is-new="${req.isNew}" data-is-updated="${req.isUpdated}">
                <div class="requirement-header">
                  <span class="requirement-id">${req.id}</span>
                  <span class="requirement-title">${req.title}</span>
                  ${req.isNew ? '<span class="badge new">NEW</span>' : ''}
                  ${req.isUpdated ? '<span class="badge updated">UPDATED</span>' : ''}
                </div>
                <div class="requirement-description">${req.description}</div>
                <div class="requirement-source">Source: ${req.source}</div>
              </div>
            `).join('')}
          </div>
        `;
      }
      
      // Assumptions
      if (brd.assumptions && brd.assumptions.length > 0) {
        html += `
          <div class="brd-section">
            <h2 class="brd-section-title">Assumptions</h2>
            <div class="brd-section-content">
              <ul>
                ${brd.assumptions.map(a => `<li>${a}</li>`).join('')}
              </ul>
            </div>
          </div>
        `;
      }
      
      // Success Metrics
      if (brd.successMetrics && brd.successMetrics.length > 0) {
        html += `
          <div class="brd-section">
            <h2 class="brd-section-title">Success Metrics</h2>
            <div class="brd-section-content">
              <ul>
                ${brd.successMetrics.map(m => `<li>${m}</li>`).join('')}
              </ul>
            </div>
          </div>
        `;
      }
      
      container.innerHTML = html;
    }
    
    // Initialize
    updateUI();
  </script>
</body>
</html>
